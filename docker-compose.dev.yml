services:
  postgres:
    image: postgres:16-alpine
    container_name: hanen-shop-db-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hanen}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hanen}
      POSTGRES_DB: ${POSTGRES_DB:-hanen_shop}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    # Expose logs for debugging
    command: postgres -c log_statement=all

volumes:
  postgres_data_dev:
