services:
  postgres:
    image: postgres:16-alpine
    container_name: hanen-shop-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hanen}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hanen}
      POSTGRES_DB: ${POSTGRES_DB:-hanen_shop}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: hanen-shop-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-hanen}:${POSTGRES_PASSWORD:-hanen}@postgres:5432/${POSTGRES_DB:-hanen_shop}
      PORT: "3000"
      CORS_ORIGIN: "http://localhost:4200"
      LOG_LEVEL: info
    depends_on:
      - postgres

volumes:
  postgres_data:
